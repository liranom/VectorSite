<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אחד באפריל שמח!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }
        h1 {
            color: #2c3e50;
            font-size: 26px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="WIN_20260401_12_11_35_Pro.jpg" alt="תמונה של בחור מסמן לייק">
        <h1>אחד באפריל שמח!</h1>
        <p class="apology">בהזדמנות זו אני רוצה לבקש סליחה, יכול מאוד להיות שהלכתי קצת רחוק מדי השנה מקווה שלא תשנאו אותי לעד וחג פסח שמח :)</p>
    </div>

</body>
</html>
